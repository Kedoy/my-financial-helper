services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ks_redis
    restart: unless-stopped
    networks:
      - ks_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ks_postgres
    environment:
      POSTGRES_DB: fin_db
      POSTGRES_USER: fin_user
      POSTGRES_PASSWORD: fin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ks_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin_user -d fin_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ks_backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: fin_db
      POSTGRES_USER: fin_user
      POSTGRES_PASSWORD: fin_password
      SECRET_KEY: django-insecure-change-me-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://127.0.0.1:5173,http://127.0.0.1:80
      FRONTEND_URL: http://localhost:80
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: "0"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 120 config.wsgi:application"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    networks:
      - ks_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend (built)
  frontend:
    build:
      context: ./my-finance-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: ks_frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ks_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ks_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/staticfiles:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ks_network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_static:
  backend_media:

networks:
  ks_network:
    driver: bridge
