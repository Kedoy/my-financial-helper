components:
  schemas:
    Category:
      type: object
      description: Serializer для категории.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 100
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          default: expense
          title: Тип
        icon:
          type: string
          description: Название иконки
          maxLength: 50
        color:
          type: string
          description: Цвет в формате HEX
          maxLength: 7
        user:
          type: integer
          readOnly: true
          nullable: true
          title: Пользователь
        is_system:
          type: boolean
          readOnly: true
          default: false
          description: Системная категория
        transactions_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_system
      - name
      - transactions_count
      - updated_at
      - user
    CategoryCreate:
      type: object
      description: Serializer для создания категории.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 100
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          title: Тип
        icon:
          type: string
          description: Название иконки
          maxLength: 50
        color:
          type: string
          description: Цвет в формате HEX
          maxLength: 7
      required:
      - id
      - name
    CategoryCreateRequest:
      type: object
      description: Serializer для создания категории.
      properties:
        name:
          type: string
          minLength: 1
          title: Название
          maxLength: 100
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          title: Тип
        icon:
          type: string
          minLength: 1
          description: Название иконки
          maxLength: 50
        color:
          type: string
          minLength: 1
          description: Цвет в формате HEX
          maxLength: 7
      required:
      - name
    CategoryUpdate:
      type: object
      description: Serializer для обновления категории.
      properties:
        name:
          type: string
          title: Название
          maxLength: 100
        icon:
          type: string
          description: Название иконки
          maxLength: 50
        color:
          type: string
          description: Цвет в формате HEX
          maxLength: 7
      required:
      - name
    CategoryUpdateRequest:
      type: object
      description: Serializer для обновления категории.
      properties:
        name:
          type: string
          minLength: 1
          title: Название
          maxLength: 100
        icon:
          type: string
          minLength: 1
          description: Название иконки
          maxLength: 50
        color:
          type: string
          minLength: 1
          description: Цвет в формате HEX
          maxLength: 7
      required:
      - name
    Comment:
      type: object
      description: Serializer для комментариев.
      properties:
        id:
          type: integer
          readOnly: true
        post:
          type: integer
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        content:
          type: string
          title: Текст комментария
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - content
      - created_at
      - id
      - post
      - updated_at
    CommentRequest:
      type: object
      description: Serializer для комментариев.
      properties:
        content:
          type: string
          minLength: 1
          title: Текст комментария
      required:
      - content
    CustomTokenObtainPairRequest:
      type: object
      description: |-
        Кастомный serializer для токенов с данными пользователя.
        Позволяет использовать email вместо username для входа.
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedCommentList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
    PaginatedPostList:
      type: object
      required:
