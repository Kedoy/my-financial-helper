          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
    PasswordResetConfirmRequest:
      type: object
      description: Serializer для подтверждения сброса пароля.
      properties:
        token:
          type: string
          writeOnly: true
          minLength: 1
          title: Токен
        password:
          type: string
          writeOnly: true
          minLength: 8
          title: Новый пароль
        password_confirm:
          type: string
          writeOnly: true
          minLength: 8
          title: Подтверждение пароля
      required:
      - password
      - password_confirm
      - token
    PasswordResetRequest:
      type: object
      description: Serializer для запроса сброса пароля.
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PasswordResetRequestRequest:
      type: object
      description: Serializer для запроса сброса пароля.
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    PatchedCategoryUpdateRequest:
      type: object
      description: Serializer для обновления категории.
      properties:
        name:
          type: string
          minLength: 1
          title: Название
          maxLength: 100
        icon:
          type: string
          minLength: 1
          description: Название иконки
          maxLength: 50
        color:
          type: string
          minLength: 1
          description: Цвет в формате HEX
          maxLength: 7
    PatchedCommentRequest:
      type: object
      description: Serializer для комментариев.
      properties:
        content:
          type: string
          minLength: 1
          title: Текст комментария
    PatchedPostCreateUpdateRequest:
      type: object
      description: Serializer для создания и обновления постов.
      properties:
        title:
          type: string
          minLength: 1
          title: Заголовок
          maxLength: 200
        content:
          type: string
          minLength: 1
          title: Содержимое
        visibility:
          allOf:
          - $ref: '#/components/schemas/VisibilityEnum'
          title: Видимость
        image:
          type: string
          format: binary
          nullable: true
          title: Изображение
    PatchedProfileRequest:
      type: object
      description: Serializer для профиля пользователя.
      properties:
        avatar:
          type: string
          format: binary
          nullable: true
          description: Аватар пользователя
        bio:
          type: string
          nullable: true
          description: Краткая информация о себе
          maxLength: 500
        currency:
          type: string
          minLength: 1
          description: Код валюты (RUB, USD, EUR)
          maxLength: 3
    PatchedTransactionUpdateRequest:
      type: object
      description: Serializer для обновления транзакции.
      properties:
        category:
          type: integer
          nullable: true
          title: Категория
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
          title: Сумма
        description:
          type: string
          nullable: true
          title: Описание
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          title: Тип
        date:
          type: string
          format: date-time
          title: Дата
    PatchedUserRequest:
      type: object
      description: Serializer для пользователя.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        username:
          type: string
          minLength: 1
          title: Имя пользователя
          description: Обязательное поле. Не более 150 символов. Только буквы, цифры
            и символы @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          title: Имя
          maxLength: 150
        last_name:
          type: string
          title: Фамилия
          maxLength: 150
